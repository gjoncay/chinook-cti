<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Chinook Cyber — an ATT&CK-native threat actor browser for CTI practitioners."
    />
    <link rel="icon" type="image/png" href="/chinook-logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <title>Chinook Cyber — ATT&CK Browser</title>
    <script>
      // Apply persisted theme before first paint to avoid a flash. Light is the default.
      try {
        if (localStorage.getItem("chinook-theme") === "dark")
          document.documentElement.setAttribute("data-theme", "dark");
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
